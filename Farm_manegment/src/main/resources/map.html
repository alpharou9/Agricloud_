<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; margin: 0; background: #ddd; }
        body { margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    var map = L.map('map', { zoomControl: true }).setView([36.8065, 10.1815], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var marker;

    // The "Glitch Killer": forces map to redraw gray areas
    function refreshMap() {
        setTimeout(function() {
            map.invalidateSize();
        }, 400);
    }

    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        if (marker) marker.setLatLng(e.latlng);
        else marker = L.marker(e.latlng).addTo(map);

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(res => res.json())
            .then(data => {
                var name = data.display_name.split(',')[0] || "Selected Site";
                app.updateLocationData(lat, lng, name);
            }).catch(() => app.updateLocationData(lat, lng, "Manual Location"));
    });

    window.onload = refreshMap;
</script>
</body>
</html>
